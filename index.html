<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幾何跑酷 - 房間連線版</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #1a1a1a;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; color: white; font-family: 'Segoe UI', sans-serif;
        }
        canvas {
            background-color: #111;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            border-radius: 4px;
            display: none; /* 遊戲開始前先隱藏 */
        }
        /* 質感彈出式全螢幕遮罩 */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(20, 20, 20, 0.95);
            display: flex; justify-content: center; align-items: center;
            z-index: 10; transition: all 0.3s ease;
        }
        .window-card {
            background: #2a2a2a; padding: 40px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 360px; text-align: center; border: 1px solid #3a3a3a;
        }
        h2 { margin-top: 0; color: #00ffcc; letter-spacing: 2px; }
        input {
            width: 100%; padding: 12px; margin: 10px 0; box-sizing: border-box;
            background: #111; border: 1px solid #444; color: white; border-radius: 6px;
            font-size: 16px; transition: 0.2s;
        }
        input:focus { border-color: #00ffcc; outline: none; }
        button {
            width: 100%; padding: 12px; margin: 10px 0; background: #00ffcc;
            border: none; color: #111; font-weight: bold; border-radius: 6px;
            font-size: 16px; cursor: pointer; transition: 0.2s;
        }
        button:hover { background: #00e6b8; transform: translateY(-2px); }
        button.secondary { background: #444; color: white; }
        button.secondary:hover { background: #555; }
        
        /* 房間玩家列表 */
        #playerList {
            text-align: left; background: #111; padding: 15px;
            border-radius: 6px; margin: 15px 0; max-height: 120px; overflow-y: auto;
        }
        .player-item { padding: 5px 0; color: #ff9900; font-family: monospace; }
        .player-item.host::after { content: " ⭐ 房主"; color: #ffcc00; font-size: 12px; }

        /* 關卡選擇卡片 */
        .level-select-box { display: flex; justify-content: space-between; margin: 15px 0; }
        .level-btn {
            flex: 1; margin: 0 5px; padding: 10px; background: #333; border: 2px solid transparent;
            color: white; border-radius: 6px; cursor: pointer; font-weight: bold;
        }
        .level-btn.active { border-color: #00ffcc; color: #00ffcc; background: #222; }
        
        /* 隱藏用類別 */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="authOverlay" class="overlay">
        <div class="window-card">
            <h2>幾何跑酷</h2>
            <input type="text" id="username" placeholder="輸入帳號 (ID)" />
            <input type="password" id="password" placeholder="輸入密碼 (4位數)" maxlength="4" />
            <button id="btnLogin">登入遊戲</button>
            <button id="btnRegister" class="secondary">註冊新帳號</button>
        </div>
    </div>

    <div id="lobbyOverlay" class="overlay hidden">
        <div class="window-card">
            <h2>遊戲房間大廳</h2>
            <input type="text" id="roomId" placeholder="輸入房間代碼進入或創建" />
            <button id="btnJoinRoom">進入 / 創建房間</button>
        </div>
    </div>

    <div id="roomOverlay" class="overlay hidden">
        <div class="window-card">
            <h2 id="roomTitle">房間: 未知</h2>
            <div id="playerList">
                </div>
            
            <div style="text-align: left; margin-top: 15px; font-size: 14px; color: #aaa;">選擇關卡:</div>
            <div class="level-select-box">
                <button class="level-btn active" data-level="1">第 1 關</button>
                <button class="level-btn" data-level="2" id="lvl2Btn" disabled>第 2 關</button>
                <button class="level-btn" data-level="3" id="lvl3Btn">第 3 關</button>
            </div>

            <button id="btnStartGame" class="hidden">開始遊戲</button>
            <div id="waitHostMsg" style="color: #aaa; margin: 10px 0;">等待房主開始遊戲...</div>
        </div>
    </div>

    <canvas id="gameCanvas" width="800" height="450"></canvas>

    <script type="module" src="./src/game.js"></script>
</body>
</html>
