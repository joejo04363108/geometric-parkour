<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幾何跑酷 - 模組化連線版</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #222;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; color: white; font-family: sans-serif;
        }
        canvas { background-color: #111; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        #ui { position: absolute; top: 20px; left: 20px; }
    </style>
</head>
<body>

    <div id="ui">
        <h2>幾何跑酷 (Geometric Parkour)</h2>
        <p>控制方式：方向鍵 <b>← / →</b> 移動，<b>Space / ↑</b> 跳躍</p>
    </div>

    <canvas id="gameCanvas" width="800" height="450"></canvas>

    <script type="module" src="./src/game.js"></script>
</body>
